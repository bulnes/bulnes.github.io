---
layout: base
---

<article class="article">

  <header class="article__header">
    <h1 class="article__title">{{ page.title }}</h1>

    {% include author.html %}

    <time class="article__date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%Y" }}
    </time>
  </header>

  <main class="article__content">
    {{ content }}
  </main>

</article>
